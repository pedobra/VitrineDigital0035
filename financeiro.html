<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Financeiro - ImobiRecife</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function () {
            try {
                const theme = localStorage.getItem('imobimaster_theme_tokens');
                if (theme) {
                    const tokens = JSON.parse(theme);
                    const root = document.documentElement;
                    Object.entries(tokens).forEach(([key, value]) => {
                        root.style.setProperty(key, value);
                    });
                }
            } catch (e) { }
        })();
    </script>
    <script type="module" src="js/auth-guard.js"></script>
</head>

<body class="bg-slate-50 flex flex-col md:flex-row">
    <aside class="w-full md:w-64 bg-slate-900 md:min-h-screen text-white p-6 sticky top-0 z-50 md:block">
        <div class="flex items-center justify-between md:block">
            <h2 class="text-xl font-bold md:mb-10 flex items-center gap-2">
                Painel Administrativo
            </h2>
            <button class="md:hidden text-slate-400"
                onclick="document.getElementById('mobile-nav').classList.toggle('hidden')">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7">
                    </path>
                </svg>
            </button>
        </div>
        <nav id="mobile-nav" class="hidden md:block space-y-2 mt-6 md:mt-0">
            <a href="dashboard.html" class="block p-3 hover:bg-slate-800 rounded-lg transition">Visão Geral</a>
            <a href="leads.html" class="block p-3 hover:bg-slate-800 rounded-lg transition">Leads</a>
            <a href="imoveis.html" class="block p-3 hover:bg-slate-800 rounded-lg transition">Imóveis</a>
            <a href="financeiro.html" class="block p-3 bg-blue-600 rounded-lg">Financeiro</a>
            <a href="configuracoes.html" class="block p-3 hover:bg-slate-800 rounded-lg transition">Configurações</a>
            <button id="btn-logout"
                class="block w-full text-left p-3 text-red-400 hover:bg-red-950 rounded-lg mt-10">Sair</button>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Financeiro</h1>
                <p class="text-slate-500 text-sm">Controle de propriedades vendidas e comissões.</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="md:hidden bg-slate-100 rounded-xl p-1 flex items-center shrink-0">
                    <button id="btn-view-table" class="p-3 bg-white rounded-lg shadow-sm text-blue-600 transition-all"
                        title="Ver em Tabela">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z" />
                        </svg>
                    </button>
                    <button id="btn-view-cards"
                        class="p-3 rounded-lg text-slate-400 hover:text-slate-600 transition-all" title="Ver em Cards">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h6v6h-6z" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Container Resumo -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Total de Vendas</p>
                <h2 id="total-vendas" class="text-4xl font-black text-slate-900">R$ 0,00</h2>
            </div>
            <div class="bg-blue-600 p-6 rounded-2xl shadow-sm border border-blue-500 text-white">
                <p class="text-sm font-bold text-blue-200 uppercase tracking-widest mb-2">Total de Comissões</p>
                <h2 id="total-comissoes" class="text-4xl font-black text-white">R$ 0,00</h2>
            </div>
        </div>

        <div id="view-table-container"
            class="block md:block bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden responsive-table">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Cód.</th>
                            <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Imóvel</th>
                            <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Valor Venda</th>
                            <th class="p-5 text-xs font-bold text-slate-400 uppercase tracking-widest">Comissão (%)</th>
                            <th class="p-5 text-xs font-bold text-blue-600 uppercase tracking-widest text-right">
                                Comissão (R$)</th>
                        </tr>
                    </thead>
                    <tbody id="finance-table-body">
                        <tr>
                            <td colspan="5" class="p-20 text-center text-slate-400">Carregando dados...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="view-cards-container" class="hidden md:hidden grid-cols-1 gap-4">
            <div class="p-10 text-center text-slate-400">Carregando dados...</div>
        </div>
    </main>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/financeiro.js"></script>
</body>

</html>
